# Nginx do container webvexyn-dev — idêntico ao prod, mas com cabeçalho
# que impede cache (ambiente de desenvolvimento muda com frequência).
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Marca visível de que é o ambiente de DEV.
    add_header X-Environment "dev" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Em dev, nada de cache agressivo — sempre conteúdo fresco.
    location /assets/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/xml font/woff2;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
