# Nginx do container webvexyn-prod — serve a SPA (React Router v7 / BrowserRouter)
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # SPA: qualquer rota desconhecida cai no index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets com hash no nome -> cache longo e imutável.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Compressão dos textos/JS/CSS.
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/xml font/woff2;

    # index.html nunca em cache (garante deploy novo visível na hora).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
