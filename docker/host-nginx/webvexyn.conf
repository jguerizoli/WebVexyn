# Nginx do HOST — reverse proxy para os containers WebVexyn.
#
# Instalar (precisa sudo — dono):
#   sudo cp /var/www/webvexyn/docker/host-nginx/webvexyn.conf /etc/nginx/sites-available/webvexyn
#   sudo ln -s /etc/nginx/sites-available/webvexyn /etc/nginx/sites-enabled/webvexyn
#   sudo nginx -t && sudo systemctl reload nginx
#
# O TLS é terminado na borda da Cloudflare; o tráfego chega aqui via Cloudflare
# Tunnel (cloudflared) em HTTP na porta 80. Por isso NÃO há blocos 443 nem Certbot:
# o cloudflared faz conexão outbound e a Cloudflare emite/renova o certificado.

# A Cloudflare envia o protocolo original em X-Forwarded-Proto. Honramos esse header
# (cai para $scheme em acesso direto local, sem o header) para o Jenkins gerar URLs
# https corretas e os apps saberem que estão atrás de TLS.
map $http_x_forwarded_proto $fwd_proto {
    default $scheme;
    https   https;
    http    http;
}

upstream webvexyn_prod { server 127.0.0.1:8080; }
upstream webvexyn_dev  { server 127.0.0.1:8081; }
upstream jenkins       { server 127.0.0.1:8082; }

# ---------------- Produção ----------------
server {
    listen 80;
    listen [::]:80;
    server_name vexynlab.com.br www.vexynlab.com.br;

    location / {
        proxy_pass http://webvexyn_prod;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
    }
}

# ---------------- Desenvolvimento ----------------
server {
    listen 80;
    listen [::]:80;
    server_name dev.vexynlab.com.br;

    location / {
        proxy_pass http://webvexyn_dev;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
    }
}

# ---------------- Jenkins ----------------
server {
    listen 80;
    listen [::]:80;
    server_name jenkins.vexynlab.com.br;

    # Jenkins envia headers não-padrão e precisa de uploads/webhooks sem buffer.
    ignore_invalid_headers off;
    proxy_request_buffering off;
    client_max_body_size 50m;

    location / {
        proxy_pass http://jenkins;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;

        # Suporte a WebSocket (console em tempo real do Jenkins).
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90s;
    }
}
