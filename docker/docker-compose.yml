# WebVexyn — orquestração dos 3 serviços.
# Uso:
#   docker compose build --no-cache webvexyn-prod webvexyn-dev
#   docker compose up -d
#   docker compose ps

services:
  # ---------------- Produção (branch main) ----------------
  webvexyn-prod:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BRANCH: main
        NGINX_CONF: prod.conf
        GIT_TOKEN: ${GIT_TOKEN:-}
    image: webvexyn-prod:latest
    container_name: webvexyn-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"   # exposto só no loopback; o Nginx do host faz o proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - webvexyn-net

  # ---------------- Desenvolvimento (branch develop) ----------------
  webvexyn-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BRANCH: develop
        NGINX_CONF: dev.conf
        GIT_TOKEN: ${GIT_TOKEN:-}
    image: webvexyn-dev:latest
    container_name: webvexyn-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - webvexyn-net

  # ---------------- Jenkins CI/CD ----------------
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
      args:
        DOCKER_GID: ${DOCKER_GID:-988}
    image: webvexyn-jenkins:latest
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8080"   # UI (proxy pelo Nginx do host)
      - "50000:50000"           # agentes JNLP
    environment:
      # Wizard desabilitado: configuração feita via JCasC (jenkins/casc/jenkins.yaml).
      JAVA_OPTS: "-Xmx512m -Xms256m -Djenkins.install.runSetupWizard=false"
      CASC_JENKINS_CONFIG: "/var/www/webvexyn/docker/jenkins/casc/jenkins.yaml"
      JENKINS_ADMIN_USER: "${JENKINS_ADMIN_USER:-admin}"
      JENKINS_ADMIN_PASSWORD: "${JENKINS_ADMIN_PASSWORD:-}"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock          # acesso ao Docker do host
      - /var/www/webvexyn/docker:/var/www/webvexyn/docker:ro  # compose files (read-only)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/login"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - webvexyn-net

  # ---------------- Cloudflare Tunnel (acesso público + TLS na borda) ----------------
  # Conexão outbound para a borda da Cloudflare — dispensa port forwarding/NAT.
  # network_mode: host para alcançar o Nginx do host em 127.0.0.1:80, que roteia
  # por Host para os 3 serviços. Ingress (public hostnames) é configurado no painel
  # Zero Trust, todos apontando para http://localhost:80.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 60s
      timeout: 10s
      retries: 3

networks:
  webvexyn-net:
    name: webvexyn-net
    driver: bridge

volumes:
  jenkins_home:
    name: jenkins_home
